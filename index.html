<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Premium artist portfolio with cinematic slider transitions and editorial design."
    />
    <title>Atelier Noire | Artist Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="noise-layer" aria-hidden="true"></div>

    <header class="site-header" id="siteHeader">
      <div class="hdr-grid">

        <!-- Logo -->
        <div class="hdr-logo">
          <a class="hdr-logo-link" href="index.html" aria-label="Home">
            <span class="hdr-logo-line1">DE2<sup>&reg;</sup></span>
            <span class="hdr-logo-line2">K24</span>
          </a>
        </div>

        <!-- Contact -->
        <div class="hdr-contact">
          <p class="hdr-label">Available for Freelance</p>
          <a href="mailto:designembraced@gmail.com">designembraced@gmail.com</a>
          <a href="tel:+4407749737297">+44 07749 737297</a>
        </div>

        <!-- Services -->
        <div class="hdr-services">
          <p>Web Design &nbsp;&middot;&nbsp; UI / UX</p>
          <p>Branding &nbsp;|&nbsp; Typeface Design</p>
          <p>Motion Design</p>
        </div>

        <!-- Social -->
        <div class="hdr-social">
          <span class="hdr-label">Social:</span>
          <div class="hdr-social-links">
            <a href="#" aria-label="Twitter">TW</a>
            <a href="#" aria-label="Dribbble">DR</a>
            <a href="#" aria-label="LinkedIn">LI</a>
          </div>
        </div>

        <!-- Nav -->
        <nav class="hdr-nav" aria-label="Main navigation">
          <a class="hdr-nav-link is-active" href="#">WRK</a>
          <a class="hdr-nav-link" href="#">ABT</a>
        </nav>

      </div>
    </header>

    <main>
      <section class="hero section">
        <div class="hero-divider" aria-hidden="true"></div>
        <div class="hero-grid">
          <div class="slider-container">
            <button class="nav-arrow" id="prevBtn" aria-label="Previous project"></button>
            <div class="slider-shell" id="sliderShell">
              <div class="depth-bg" aria-hidden="true"></div>
              <div class="slides-track" id="slidesTrack" aria-live="polite"></div>
            </div>
            <button class="nav-arrow" id="nextBtn" aria-label="Next project"></button>
          </div>

          <!-- Orbiting Artwork Images -->
          <div class="orbit-container" id="orbitContainer">
            <div class="orbit-item orbit-item-1">
              <img src="assets/images/artwork-1.jpg" alt="Artwork 1" />
            </div>
            <div class="orbit-item orbit-item-2">
              <img src="assets/images/artwork-2.jpg" alt="Artwork 2" />
            </div>
            <div class="orbit-item orbit-item-3">
              <img src="assets/images/artwork-3.jpg" alt="Artwork 3" />
            </div>
            <div class="orbit-item orbit-item-4">
              <img src="assets/images/artwork-4.jpg" alt="Artwork 4" />
            </div>
            <div class="orbit-item orbit-item-5">
              <img src="assets/images/artwork-5.jpg" alt="Artwork 5" />
            </div>
          </div>

          <aside class="project-meta">
            <p class="project-index" id="projectIndex">PR.01 / 07</p>
            <p class="project-caption" id="projectCaption">Artist Name<br />Artwork Title</p>
          </aside>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="data.js"></script>
    <script src="script.js" defer></script>
  </body>
</html>
