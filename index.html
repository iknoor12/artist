<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Premium artist portfolio with cinematic slider transitions and editorial design."
    />
    <title>Atelier Noire | Artist Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="noise-layer" aria-hidden="true"></div>

    <header class="site-header">
      <div class="brand-wrap">
        <a class="brand" href="#hero">ATELIER NOIRE</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="#hero">Projects</a>
        </nav>
      </div>
    </header>

    <main>
      <section id="hero" class="hero section">
        <div class="hero-divider" aria-hidden="true"></div>
        <div class="hero-grid">
          <button class="nav-arrow" id="prevBtn" aria-label="Previous project">
            <span>&larr;</span>
          </button>

          <div class="slider-shell" id="sliderShell">
            <div class="depth-bg" aria-hidden="true"></div>
            <div class="slides-track" id="slidesTrack" aria-live="polite"></div>
          </div>

          <button class="nav-arrow" id="nextBtn" aria-label="Next project">
            <span>&rarr;</span>
          </button>

          <aside class="project-meta">
            <p class="project-index" id="projectIndex">PR.01 / 07</p>
            <p class="project-caption" id="projectCaption">Artist Name<br />Artwork Title</p>
          </aside>
        </div>
      </section>
    </main>

    <div class="detail-overlay" id="detailOverlay" aria-hidden="true"></div>
    <aside class="detail-panel" id="detailPanel" aria-hidden="true">
      <button class="detail-close" id="detailClose" aria-label="Close details">Close</button>
      <p class="eyebrow">Artwork Detail</p>
      <h2 class="detail-artist" id="detailArtist"></h2>
      <p class="detail-title" id="detailTitle"></p>
      <div class="detail-meta">
        <p><span>Year</span><span id="detailYear"></span></p>
        <p><span>Medium</span><span id="detailMedium"></span></p>
      </div>
      <p class="detail-description" id="detailDescription"></p>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
