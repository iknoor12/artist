<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atelier Noire | Artists</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="noise-layer" aria-hidden="true"></div>
    <header class="site-header">
      <div class="brand-wrap compact">
        <a class="brand" href="index.html">ATELIER NOIRE</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a class="is-active" href="artists.html">Artists</a>
          <a href="gallery.html">Gallery</a>
          <a href="collections.html">Collections</a>
          <a href="exhibitions.html">Exhibitions</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero section">
        <div class="hero-divider" aria-hidden="true"></div>
        <div class="hero-grid">
          <button class="nav-arrow" id="prevBtn" aria-label="Previous project"><span>&larr;</span></button>
          <div class="slider-shell" id="sliderShell">
            <div class="depth-bg" aria-hidden="true"></div>
            <div class="slides-track" id="slidesTrack" aria-live="polite"></div>
          </div>
          <button class="nav-arrow" id="nextBtn" aria-label="Next project"><span>&rarr;</span></button>
          <aside class="project-meta">
            <p class="project-index" id="projectIndex">PR.01 / 07</p>
            <p class="project-caption" id="projectCaption">Artist Name<br />Artwork Title</p>
          </aside>
        </div>
      </section>
    </main>

    <div class="detail-overlay" id="detailOverlay" aria-hidden="true"></div>
    <aside class="detail-panel" id="detailPanel" aria-hidden="true">
      <button class="detail-close" id="detailClose" aria-label="Close details">Close</button>
      <p class="eyebrow">Artwork Detail</p>
      <h2 class="detail-artist" id="detailArtist"></h2>
      <p class="detail-title" id="detailTitle"></p>
      <div class="detail-meta">
        <p><span>Year</span><span id="detailYear"></span></p>
        <p><span>Medium</span><span id="detailMedium"></span></p>
      </div>
      <p class="detail-description" id="detailDescription"></p>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
